<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Property Manager</title>
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <button onclick="togglePropertiesContainer()" title="Hide/View Properties">🏠</button>
    <button onclick="toggleTenantsContainer()" title="Hide/View Tenants">👥</button>
    </div>

    <div class="propertiesContainer" style="display: none;">
      <h2>Properties</h2>
      <input type="text" id="propertyName" placeholder="Property Name" />
      <button onclick="addProperty()">Add New Property</button>
      <button onclick="loadProperties()">Show All properties</button>
      <!-- <div id="propertiesList"></div> -->
      <table id="propertiesList" border="1" width="100%">
        <thead>
          <tr>
            <th>Property Name</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="propertiesListBody"></tbody>
      </table>
    </div>

    <div class="tenantsContainer" style="display: none;">
      <h2>Tenant</h2>
      <input type="text" id="tenantName" placeholder="Tenant Name" />
      <select id="propertySelectForTenant"></select>
      <button onclick="addTenant()">Add New Tenant</button>
      <button onclick="loadTenants()">Show All Tenants</button>
      <table id="tenantsList" border="1" width="100%">
        <thead>
          <tr>
            <th>Tenant Name</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tenantsListBody"></tbody>
      </table>
    </div>
    <div class="rentRecordsContainer" style="display: none;">
      <h2>Get Property : <select id="propertySelectForTenant1"></select> Data for <input type="month" id="periodPicker"
          onchange="onMonthSelected(this.value)">.</h2>
      <table border="1" width="100%" style="display: none;" id="rentRecordTable">
        <thead>
          <tr>
            <th>Tenant Name</th>
            <th>Month</th>
            <th>Year</th>
            <th>Rent Amount</th>
            <th>Rent Recieved</th>
          </tr>
        </thead>
        <tbody id="rentRecordList"></tbody>
      </table>
    </div>
  </div>
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>
  <script src="custom-property-manager.js"></script>
</body>
</html>
